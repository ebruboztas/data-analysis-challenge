<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sayza - Kayıt Ol</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>Sayza'ya Katılın</h2>
        <form method="POST">
            <p>Kullanıcı Adı: <br><input type="text" name="username"></p>
            <p>E-posta: <br><input type="email" name="email"></p>
            <p>Şifre: <br><input type="password" name="password"></p>
            <p>Şifreyi Onayla: <br><input type="password" name="confirm_password"></p>
            <button type="submit">Kayıt Ol</button>
        </form>
    </div>
</body>
</html>
